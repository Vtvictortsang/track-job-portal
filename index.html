<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track - 你的職業導航</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f8fafc;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .tag-btn { transition: all 0.2s ease; }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .google-btn {
            transition: all 0.3s;
            border: 1px solid #dadce0;
        }
        .google-btn:hover {
            background-color: #f8f9fa;
            box-shadow: 0 1px 3px rgba(60,64,67,0.3);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- 頂部導航欄 -->
    <header class="bg-white shadow-sm sticky top-0 z-50 border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between gap-4">
            <div class="flex items-center gap-2 cursor-pointer" onclick="resetFiltersAndShowList()">
                <div class="bg-blue-600 p-1.5 rounded-lg">
                    <i class="fas fa-route text-white text-xl"></i>
                </div>
                <h1 class="text-2xl font-bold text-blue-600 tracking-tight">Track</h1>
            </div>

            <div class="flex-1 max-w-xl hidden md:block">
                <div class="relative">
                    <input type="text" id="jobSearchInput" oninput="applyFilters()" placeholder="搜尋職位、公司或關鍵字..." 
                           class="w-full pl-10 pr-4 py-2 bg-gray-100 border-transparent focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-transparent rounded-full transition-all outline-none text-sm">
                    <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                </div>
            </div>

            <div id="auth-buttons" class="flex items-center gap-3">
                <button onclick="openLoginModal()" class="bg-blue-600 text-white text-sm font-medium px-5 py-2.5 rounded-full hover:bg-blue-700 transition shadow-md shadow-blue-100 flex items-center gap-2">
                    <i class="fas fa-briefcase text-xs"></i> 僱主入口
                </button>
            </div>

            <div id="user-profile" class="hidden flex items-center gap-4">
                <div class="flex items-center gap-2 border-r pr-4 border-gray-200 cursor-pointer hover:bg-gray-50 p-1 rounded-lg transition" onclick="showEmployerProfile()">
                    <img id="user-avatar" class="w-8 h-8 rounded-full border border-gray-200" src="" alt="Avatar">
                    <div class="hidden sm:block text-left">
                        <p id="user-name" class="text-sm font-bold text-gray-800 leading-none"></p>
                        <p class="text-[10px] text-blue-600 font-medium uppercase">管理後台</p>
                    </div>
                </div>
                <button onclick="handleLogout()" class="text-gray-400 hover:text-red-500 transition">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-6 flex flex-col md:flex-row gap-6 flex-1 w-full">
        
        <!-- 左側欄 -->
        <aside id="left-sidebar" class="w-full md:w-72 flex-shrink-0 space-y-6">
            <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100 sticky top-24">
                <div class="mb-6">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xs font-bold text-gray-400 uppercase tracking-wider flex items-center gap-2">
                            <i class="fas fa-sliders-h text-[10px]"></i> 篩選條件
                        </h2>
                        <button onclick="resetFilters()" class="text-[10px] text-blue-600 hover:underline font-bold">清除全部</button>
                    </div>

                    <!-- 工作性質 -->
                    <p class="text-sm font-bold text-gray-700 mb-3">工作性質</p>
                    <div class="flex flex-wrap gap-2 mb-6">
                        <label class="cursor-pointer">
                            <input type="checkbox" name="typeFilter" value="全職" class="hidden peer" onchange="applyFilters()">
                            <span class="tag-btn px-3 py-1.5 rounded-lg border border-gray-100 bg-gray-50 text-[11px] text-gray-600 peer-checked:bg-blue-600 peer-checked:text-white peer-checked:border-blue-600 inline-block">全職</span>
                        </label>
                        <label class="cursor-pointer">
                            <input type="checkbox" name="typeFilter" value="兼職" class="hidden peer" onchange="applyFilters()">
                            <span class="tag-btn px-3 py-1.5 rounded-lg border border-gray-100 bg-gray-50 text-[11px] text-gray-600 peer-checked:bg-blue-600 peer-checked:text-white peer-checked:border-blue-600 inline-block">兼職</span>
                        </label>
                        <label class="cursor-pointer">
                            <input type="checkbox" name="typeFilter" value="臨時工" class="hidden peer" onchange="applyFilters()">
                            <span class="tag-btn px-3 py-1.5 rounded-lg border border-gray-100 bg-gray-50 text-[11px] text-gray-600 peer-checked:bg-blue-600 peer-checked:text-white peer-checked:border-blue-600 inline-block">臨時工</span>
                        </label>
                    </div>

                    <!-- 工作地區 -->
                    <p class="text-sm font-bold text-gray-700 mb-3">工作地區</p>
                    <div class="space-y-2 mb-6">
                        <label class="flex items-center gap-3 cursor-pointer group">
                            <input type="checkbox" name="locFilter" value="香港島" class="w-4 h-4 rounded text-blue-600 border-gray-300" onchange="applyFilters()">
                            <span class="text-sm text-gray-600 group-hover:text-blue-600 transition">香港島</span>
                        </label>
                        <label class="flex items-center gap-3 cursor-pointer group">
                            <input type="checkbox" name="locFilter" value="九龍" class="w-4 h-4 rounded text-blue-600 border-gray-300" onchange="applyFilters()">
                            <span class="text-sm text-gray-600 group-hover:text-blue-600 transition">九龍</span>
                        </label>
                        <label class="flex items-center gap-3 cursor-pointer group">
                            <input type="checkbox" name="locFilter" value="新界區" class="w-4 h-4 rounded text-blue-600 border-gray-300" onchange="applyFilters()">
                            <span class="text-sm text-gray-600 group-hover:text-blue-600 transition">新界區</span>
                        </label>
                    </div>

                    <!-- 職業分類 -->
                    <div class="pt-4 border-t border-gray-100">
                        <h2 class="text-sm font-bold text-gray-700 mb-4 flex items-center gap-2">
                            <i class="fas fa-th-large text-blue-600 text-xs"></i> 熱門職業分類
                        </h2>
                        <nav class="space-y-1 max-h-[360px] overflow-y-auto custom-scrollbar pr-2" id="category-nav"></nav>
                    </div>
                </div>
            </div>
        </aside>

        <!-- 右側主內容區 -->
        <section id="main-content-area" class="flex-1 flex flex-col gap-8">
            
            <!-- 僱主發佈職位 (隱藏) -->
            <div id="employer-post-section" class="hidden fade-in">
                <div class="bg-white rounded-3xl p-6 shadow-sm border-2 border-blue-100">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-lg font-bold text-gray-800 flex items-center gap-2">
                            <i class="fas fa-plus-circle text-blue-600"></i> 發佈新職位
                        </h2>
                        <button onclick="togglePostForm()" id="post-toggle-btn" class="text-blue-600 text-sm font-medium hover:underline">展開表單</button>
                    </div>
                    <form id="job-post-form" class="hidden space-y-4 pt-2">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <input type="text" id="post-company" placeholder="公司名" class="px-4 py-2 bg-gray-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500" required>
                            <input type="text" id="post-title" placeholder="職位名稱" class="px-4 py-2 bg-gray-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500" required>
                            <select id="post-category" class="px-4 py-2 bg-gray-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500" required>
                                <option value="">選擇分類</option>
                                <option value="保安及物業管理">保安及物業管理</option>
                                <option value="飲食">飲食</option>
                                <option value="包裝">包裝</option>
                                <option value="運輸及物流">運輸及物流</option>
                                <option value="教育">教育</option>
                                <option value="健身">健身</option>
                                <option value="辦公室">辦公室</option>
                                <option value="活動及推廣">活動及推廣</option>
                                <option value="醫療保健">醫療保健</option>
                                <option value="建造業">建造業</option>
                                <option value="清潔">清潔</option>
                                <option value="客戶服務">客戶服務</option>
                            </select>
                            <select id="post-location" class="px-4 py-2 bg-gray-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500" required>
                                <option value="香港島">香港島</option>
                                <option value="九龍">九龍</option>
                                <option value="新界區">新界區</option>
                            </select>
                            <select id="post-type" class="px-4 py-2 bg-gray-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500" required>
                                <option value="全職">全職</option>
                                <option value="兼職">兼職</option>
                                <option value="臨時工">臨時工</option>
                            </select>
                            <input type="text" id="post-salary" placeholder="薪金 (例如: $18,000)" class="px-4 py-2 bg-gray-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500" required>
                            <input type="text" id="post-contact" placeholder="負責人" class="px-4 py-2 bg-gray-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500" required>
                            <input type="tel" id="post-phone" placeholder="電話" class="px-4 py-2 bg-gray-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500" required>
                        </div>
                        <textarea id="post-content" rows="4" placeholder="工作要求與福利..." class="w-full px-4 py-2 bg-gray-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500" required></textarea>
                        <div class="flex justify-end gap-3">
                            <button type="submit" class="bg-blue-600 text-white px-8 py-2 rounded-xl font-bold hover:bg-blue-700 transition">立即發佈</button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- 列表視圖 -->
            <div id="job-list-view" class="space-y-8">
                <div id="promo-banner" class="bg-gradient-to-r from-blue-600 to-indigo-700 rounded-3xl p-8 text-white shadow-lg relative overflow-hidden">
                    <div class="relative z-10">
                        <span class="bg-white/20 text-[10px] font-bold px-2 py-1 rounded uppercase tracking-wider">最新情報</span>
                        <h2 class="text-3xl font-bold mt-2 mb-4">發現你的下一站</h2>
                        <p class="text-blue-100 max-w-md">我們整理了超過 10 個核心行業，為您推薦最合適的崗位。</p>
                    </div>
                </div>

                <div>
                    <h2 class="text-xl font-bold text-gray-800 mb-4 flex items-center justify-between">
                        <span id="list-title">最新招聘職位</span>
                        <span class="text-xs font-normal text-gray-400" id="result-count"></span>
                    </h2>
                    <div id="job-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                </div>
            </div>

            <!-- 詳情視圖 -->
            <div id="job-detail-view" class="hidden">
                <button onclick="showListPage()" class="flex items-center gap-2 text-blue-600 mb-6 font-medium hover:gap-3 transition-all">
                    <i class="fas fa-arrow-left"></i> 返回職位列表
                </button>
                <div id="detail-container" class="bg-white rounded-3xl p-8 shadow-sm border border-gray-100"></div>
            </div>

            <!-- 管理中心 -->
            <div id="employer-profile-view" class="hidden fade-in space-y-6">
                <button onclick="showListPage()" class="flex items-center gap-2 text-blue-600 mb-2 font-medium">
                    <i class="fas fa-arrow-left"></i> 返回首頁
                </button>
                <div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden">
                    <div class="bg-blue-600 h-20"></div>
                    <div class="px-8 pb-6">
                        <div class="flex justify-between items-end -mt-8 mb-4">
                            <img id="profile-avatar" class="w-16 h-16 rounded-2xl border-4 border-white shadow-md bg-white" src="" alt="Avatar">
                            <div class="flex gap-2">
                                <button onclick="switchTab('my-jobs')" id="tab-my-jobs" class="px-4 py-2 rounded-lg text-xs font-bold bg-blue-50 text-blue-600 border border-blue-100">我的職位</button>
                                <button onclick="switchTab('applications')" id="tab-applications" class="px-4 py-2 rounded-lg text-xs font-bold text-gray-500 hover:bg-gray-50 transition">收到的申請</button>
                            </div>
                        </div>
                        <h2 class="text-xl font-bold text-gray-900" id="profile-name">僱主名稱</h2>
                        <p class="text-gray-400 text-xs tracking-tight" id="profile-email"></p>
                    </div>
                </div>
                <div id="tab-content" class="space-y-4"></div>
            </div>
        </section>
    </main>

    <!-- 登入彈窗 (更新為 Google 登入) -->
    <div id="login-modal" class="fixed inset-0 bg-black/50 hidden z-[60] flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-2xl w-full max-w-sm p-8 relative shadow-2xl">
            <button onclick="closeLoginModal()" class="absolute right-6 top-6 text-gray-400 hover:text-gray-600"><i class="fas fa-times"></i></button>
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-blue-50 rounded-2xl flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-user-tie text-blue-600 text-2xl"></i>
                </div>
                <h2 class="text-2xl font-bold text-gray-900">招聘方登入</h2>
                <p class="text-gray-500 text-sm mt-2">使用 Google 帳戶管理您的職位</p>
            </div>
            
            <button onclick="handleGoogleLogin()" class="w-full google-btn bg-white text-gray-700 py-3.5 rounded-xl font-bold flex items-center justify-center gap-3 transition">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5" alt="Google">
                使用 Google 帳號登入
            </button>
            
            <p class="text-[10px] text-gray-400 text-center mt-6">登入即代表您同意服務條款與隱私權政策</p>
        </div>
    </div>

    <!-- 申請彈窗 -->
    <div id="apply-modal" class="fixed inset-0 bg-black/50 hidden z-[70] flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-2xl w-full max-w-lg p-8 relative shadow-2xl">
            <button onclick="closeApplyModal()" class="absolute right-6 top-6 text-gray-400 hover:text-gray-600"><i class="fas fa-times"></i></button>
            <div class="text-center mb-6">
                <h2 class="text-2xl font-bold text-gray-900">提交職位申請</h2>
                <p id="apply-job-title" class="text-blue-600 font-medium mt-1"></p>
            </div>
            <form id="apply-form" class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="apply-name" placeholder="您的姓名" class="w-full px-4 py-3 bg-gray-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500" required>
                    <input type="tel" id="apply-phone" placeholder="聯絡電話" class="w-full px-4 py-3 bg-gray-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500" required>
                </div>
                <textarea id="apply-experience" rows="4" class="w-full px-4 py-3 bg-gray-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500" placeholder="簡單描述您的相關經驗..." required></textarea>
                <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-700 transition">確認提交申請</button>
            </form>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-6 py-3 rounded-full text-sm font-medium hidden z-[100] shadow-2xl">
        <span id="toast-msg"></span>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // Firebase 設定
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // 全局狀態
        let currentUser = null;
        let mockJobs = [
            { id: 1, date: '2024-04-20', title: "高級物業管理員", company: "信和物業", category: "保安及物業管理", contact: "Mr. Wong", phone: "23334444", location: "九龍", type: "全職", salary: "$19,000", icon: "fas fa-shield-alt text-blue-500", desc: "負責屋苑日常保安及客戶服務。", owner: "sino_hr@gmail.com" },
            { id: 2, date: '2024-04-19', title: "連鎖店廚務助理", company: "太興集團", category: "飲食", contact: "Ms. Lee", phone: "21110000", location: "香港島", type: "兼職", salary: "$65/小時", icon: "fas fa-utensils text-orange-500", desc: "協助廚師準備食材及維持廚房清潔。", owner: "taihing_hr@gmail.com" },
            { id: 3, date: '2024-04-18', title: "物流跟車員", company: "順豐速運", category: "運輸及物流", contact: "Mr. Chan", phone: "25556666", location: "新界區", type: "全職", salary: "$17,500", icon: "fas fa-truck text-red-600", desc: "協助搬運及遞送包裹。", owner: "sf_hr@gmail.com" }
        ];
        let applications = [];
        let selectedCategory = null;
        let currentJobForApply = null;

        const POPULAR_CATEGORIES = [
            "保安及物業管理", "飲食", "包裝", "運輸及物流", 
            "教育", "健身", "辦公室", "活動及推廣", 
            "醫療保健", "建造業", "清潔", "客戶服務"
        ];

        // 監聽登入狀態
        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            updateUI(user);
            renderCategories();
            applyFilters();
        });

        // 登入功能
        window.handleGoogleLogin = async () => {
            try {
                const result = await signInWithPopup(auth, provider);
                showToast(`歡迎回來，${result.user.displayName}`);
                closeLoginModal();
            } catch (error) {
                console.error("Login failed", error);
                showToast("登入失敗，請稍後再試");
            }
        };

        // 登出功能
        window.handleLogout = async () => {
            await signOut(auth);
            showToast("已成功登出");
            showListPage();
        };

        // UI 更新
        function updateUI(user) {
            const authButtons = document.getElementById('auth-buttons');
            const userProfile = document.getElementById('user-profile');
            const employerPost = document.getElementById('employer-post-section');

            if (user) {
                authButtons.classList.add('hidden');
                userProfile.classList.remove('hidden');
                employerPost.classList.remove('hidden');
                
                document.getElementById('user-name').textContent = user.displayName;
                document.getElementById('user-avatar').src = user.photoURL || 'https://via.placeholder.com/150';
            } else {
                authButtons.classList.remove('hidden');
                userProfile.classList.add('hidden');
                employerPost.classList.add('hidden');
            }
        }

        // 核心邏輯
        window.applyFilters = () => {
            const searchQuery = document.getElementById('jobSearchInput').value.toLowerCase();
            const selectedTypes = Array.from(document.querySelectorAll('input[name="typeFilter"]:checked')).map(cb => cb.value);
            const selectedLocs = Array.from(document.querySelectorAll('input[name="locFilter"]:checked')).map(cb => cb.value);

            const filtered = mockJobs.filter(job => {
                const matchSearch = job.title.toLowerCase().includes(searchQuery) || job.company.toLowerCase().includes(searchQuery);
                const matchType = selectedTypes.length === 0 || selectedTypes.includes(job.type);
                const matchLoc = selectedLocs.length === 0 || selectedLocs.includes(job.location);
                const matchCat = !selectedCategory || job.category === selectedCategory;
                return matchSearch && matchType && matchLoc && matchCat;
            });

            let headerText = selectedCategory || "最新招聘職位";
            document.getElementById('list-title').innerHTML = headerText;
            renderJobs(filtered);
            document.getElementById('result-count').textContent = `找到 ${filtered.length} 個結果`;
        };

        window.renderCategories = () => {
            const nav = document.getElementById('category-nav');
            nav.innerHTML = '';
            POPULAR_CATEGORIES.forEach(cat => {
                const count = mockJobs.filter(j => j.category === cat).length;
                const a = document.createElement('a');
                const isActive = selectedCategory === cat;
                a.className = `flex items-center justify-between p-2.5 rounded-xl transition cursor-pointer group ${isActive ? 'bg-blue-600 text-white' : 'hover:bg-blue-50 text-gray-600'}`;
                a.innerHTML = `
                    <span class="text-xs font-medium">${cat}</span>
                    <span class="text-[9px] px-1.5 py-0.5 rounded-full ${isActive ? 'bg-white/20 text-white' : 'bg-gray-100 text-gray-400'}">${count}</span>
                `;
                a.onclick = () => {
                    selectedCategory = isActive ? null : cat;
                    renderCategories();
                    applyFilters();
                };
                nav.appendChild(a);
            });
        };

        function renderJobs(jobs) {
            const grid = document.getElementById('job-grid');
            grid.innerHTML = '';
            if(!jobs.length) {
                grid.innerHTML = `<div class="col-span-full py-16 text-center"><p class="text-gray-400 text-sm">目前沒有符合條件的職位</p></div>`;
                return;
            }
            jobs.sort((a,b) => new Date(b.date) - new Date(a.date)).forEach(job => {
                const div = document.createElement('div');
                div.className = "bg-white p-5 rounded-2xl border border-gray-100 hover:border-blue-200 hover:shadow-lg transition cursor-pointer fade-in group";
                div.onclick = () => showDetailPage(job);
                div.innerHTML = `
                    <div class="flex gap-4">
                        <div class="w-12 h-12 bg-gray-50 rounded-xl flex items-center justify-center border border-gray-100"><i class="${job.icon || 'fas fa-briefcase text-gray-300'}"></i></div>
                        <div class="flex-1">
                            <h3 class="font-bold text-gray-900 group-hover:text-blue-600 transition text-sm">${job.title}</h3>
                            <p class="text-[11px] text-gray-400 mb-2">${job.company}</p>
                            <div class="flex flex-wrap gap-2">
                                <span class="text-[10px] bg-gray-50 px-2 py-0.5 rounded-md text-gray-500">${job.location}</span>
                                <span class="text-[10px] bg-blue-50 px-2 py-0.5 rounded-md text-blue-600 font-bold">${job.salary}</span>
                                <span class="text-[10px] bg-indigo-50 px-2 py-0.5 rounded-md text-indigo-600">${job.type}</span>
                            </div>
                        </div>
                    </div>
                `;
                grid.appendChild(div);
            });
        }

        // 發佈功能
        document.getElementById('job-post-form').onsubmit = (e) => {
            e.preventDefault();
            if(!currentUser) return showToast("請先登入");
            const newJob = {
                id: Date.now(),
                date: new Date().toISOString().split('T')[0],
                title: document.getElementById('post-title').value,
                company: document.getElementById('post-company').value,
                category: document.getElementById('post-category').value,
                location: document.getElementById('post-location').value,
                type: document.getElementById('post-type').value,
                salary: document.getElementById('post-salary').value,
                contact: document.getElementById('post-contact').value,
                phone: document.getElementById('post-phone').value,
                desc: document.getElementById('post-content').value,
                icon: "fas fa-briefcase text-gray-400",
                owner: currentUser.email,
                isUserJob: true
            };
            mockJobs.push(newJob);
            applyFilters();
            renderCategories();
            e.target.reset();
            togglePostForm();
            showToast("職位已成功發佈！");
        };

        // 申請功能
        document.getElementById('apply-form').onsubmit = (e) => {
            e.preventDefault();
            applications.push({
                id: Date.now(),
                jobId: currentJobForApply.id,
                jobTitle: currentJobForApply.title,
                jobOwner: currentJobForApply.owner,
                name: document.getElementById('apply-name').value,
                phone: document.getElementById('apply-phone').value,
                experience: document.getElementById('apply-experience').value,
                date: new Date().toISOString().split('T')[0]
            });
            closeApplyModal();
            showToast("申請已提交給僱主！");
        };

        // 頁面與組件控制
        window.showDetailPage = (job) => {
            hideAllSections();
            document.getElementById('job-detail-view').classList.remove('hidden');
            document.getElementById('detail-container').innerHTML = `
                <div class="mb-6">
                    <span class="text-[10px] bg-blue-600 text-white px-2 py-1 rounded-md font-bold inline-block mb-3">${job.category}</span>
                    <h2 class="text-2xl font-bold text-gray-900">${job.title}</h2>
                    <p class="text-lg text-gray-400 font-medium">${job.company}</p>
                </div>
                <div class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-8 bg-gray-50 p-6 rounded-2xl">
                    <div><p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">待遇</p><p class="text-blue-600 font-bold">${job.salary}</p></div>
                    <div><p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">地區</p><p class="font-bold">${job.location}</p></div>
                    <div><p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">聯絡</p><p class="font-bold">${job.contact}</p></div>
                </div>
                <div class="prose max-w-none text-gray-600 whitespace-pre-line leading-relaxed mb-10">${job.desc}</div>
                <button id="apply-trigger" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-700 shadow-xl shadow-blue-100 transition">立即申請職位</button>
            `;
            document.getElementById('apply-trigger').onclick = () => openApplyModal(job);
        };

        window.showEmployerProfile = () => {
            if(!currentUser) return;
            hideAllSections();
            document.getElementById('employer-profile-view').classList.remove('hidden');
            document.getElementById('profile-name').textContent = currentUser.displayName;
            document.getElementById('profile-email').textContent = currentUser.email;
            document.getElementById('profile-avatar').src = currentUser.photoURL || 'https://via.placeholder.com/150';
            switchTab('my-jobs');
        };

        window.switchTab = (tab) => {
            if(!currentUser) return;
            const content = document.getElementById('tab-content');
            document.getElementById('tab-my-jobs').className = tab === 'my-jobs' ? "px-4 py-2 rounded-lg text-xs font-bold bg-blue-50 text-blue-600 border border-blue-100" : "px-4 py-2 rounded-lg text-xs font-bold text-gray-500 hover:bg-gray-50 transition";
            document.getElementById('tab-applications').className = tab === 'applications' ? "px-4 py-2 rounded-lg text-xs font-bold bg-blue-50 text-blue-600 border border-blue-100" : "px-4 py-2 rounded-lg text-xs font-bold text-gray-500 hover:bg-gray-50 transition";

            if(tab === 'my-jobs') {
                const myJobs = mockJobs.filter(j => j.owner === currentUser.email);
                content.innerHTML = myJobs.length ? myJobs.map(j => `<div class="bg-white p-4 rounded-xl border border-gray-100 flex justify-between items-center shadow-sm"><div><p class="font-bold text-gray-800 text-sm">${j.title}</p><p class="text-[10px] text-gray-400">${j.date} • ${j.location}</p></div><span class="text-[10px] bg-green-50 text-green-600 px-2 py-0.5 rounded-full font-bold">招聘中</span></div>`).join('') : '<p class="text-center py-10 text-gray-400 text-xs">尚未發佈職位</p>';
            } else {
                const myApps = applications.filter(a => a.jobOwner === currentUser.email);
                content.innerHTML = myApps.length ? myApps.map(a => `<div class="bg-white p-5 rounded-2xl border border-gray-100 space-y-2 shadow-sm"><div><p class="text-[10px] font-bold text-blue-600">${a.jobTitle}</p><p class="font-bold text-gray-900">${a.name}</p></div><div class="text-[11px] text-gray-500 bg-gray-50 p-3 rounded-lg">${a.experience}</div><div class="flex justify-between items-center"><p class="text-[10px] text-gray-400">${a.phone}</p><p class="text-[10px] text-gray-400">${a.date}</p></div></div>`).join('') : '<p class="text-center py-10 text-gray-400 text-xs">暫無申請者</p>';
            }
        };

        window.resetFilters = () => { document.querySelectorAll('input[type="checkbox"]').forEach(c => c.checked = false); document.getElementById('jobSearchInput').value = ''; selectedCategory = null; renderCategories(); applyFilters(); };
        window.showListPage = () => { hideAllSections(); document.getElementById('job-list-view').classList.remove('hidden'); if(currentUser) document.getElementById('employer-post-section').classList.remove('hidden'); applyFilters(); };
        window.resetFiltersAndShowList = () => { resetFilters(); showListPage(); };
        window.openLoginModal = () => document.getElementById('login-modal').classList.remove('hidden');
        window.closeLoginModal = () => document.getElementById('login-modal').classList.add('hidden');
        window.openApplyModal = (job) => { currentJobForApply = job; document.getElementById('apply-job-title').textContent = job.title; document.getElementById('apply-modal').classList.remove('hidden'); };
        window.closeApplyModal = () => document.getElementById('apply-modal').classList.add('hidden');
        window.togglePostForm = () => { const f = document.getElementById('job-post-form'); const isH = f.classList.contains('hidden'); f.classList.toggle('hidden', !isH); document.getElementById('post-toggle-btn').textContent = isH ? "收起表單" : "展開表單"; };
        window.showToast = (msg) => { const t = document.getElementById('toast'); document.getElementById('toast-msg').textContent = msg; t.classList.remove('hidden'); setTimeout(() => t.classList.add('hidden'), 3000); };
        function hideAllSections() { ['job-list-view', 'job-detail-view', 'employer-post-section', 'employer-profile-view'].forEach(id => document.getElementById(id)?.classList.add('hidden')); }

    </script>
</body>
</html>
